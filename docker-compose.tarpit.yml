# TarPit symbolic HTTP service (slot-18 local production)
#
#   docker compose -f docker-compose.tarpit.yml up -d
#   curl http://localhost:8844/health

name: cmplx-tarpit

services:
  cmplx-tarpit:
    image: python:3.12-slim
    container_name: cmplx-tarpit
    init: true
    restart: unless-stopped
    working_dir: /app
    command:
      [
        "sh",
        "-c",
        "pip install -q fastapi uvicorn pydantic 2>/dev/null; "
        "python -m uvicorn cmplx.symbolic.tarpit._adapters.http_service:app --host 0.0.0.0 --port 8844",
      ]
    environment:
      PORT: "8844"
      TARPIT_MINT_RECEIPT: ${TARPIT_MINT_RECEIPT:-1}
      PYTHONPATH: /app/src
    ports:
      - "${TARPIT_PORT:-8844}:8844"
    volumes:
      - type: bind
        source: ./src
        target: /app/src
        read_only: true
    labels:
      cmplx.layer: symbolic
      cmplx.role: slot-18-tarpit
      cmplx.api: http://localhost:${TARPIT_PORT:-8844}
    networks:
      - cmplx-backend

networks:
  cmplx-backend:
    external: true
    name: cmplx-backend
