# Lattice space exhaustion — quadrant Weyl only; lattice catalog + E8 pod index + proof capture.
#
#   docker compose -f docker-compose.backwalk-lattice-space.yml up --build --abort-on-container-exit

name: cmplx-backwalk-lattice-space

services:
  lattice-space-exhaustion:
    image: cmplx-proof-lab:latest
    build:
      context: .
      dockerfile: proof-lab/Dockerfile
    container_name: lattice-space-exhaustion
    init: true
    restart: "no"
    environment:
      PROOF_LAB_ROOT: /workspace/CMPLX-PartsFactory
      PROOF_LAB_MODE: lattice-space-exhaustion
      LATTICE_SPACE_RESUME: "1"
      WEYL_BOND_MAX_ROWS_PER_BATCH: "64"
      WEYL_BOND_BATCH_SLEEP_MS: "50"
      WEYL_BOND_MIRROR_OLOID: "1"
      LATTICE_SPACE_MAX_LIBRARY_NEEDS: "200"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      PYTHONPATH: /workspace/CMPLX-PartsFactory/packages/lattice-forge/src
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          memory: 256M
    volumes:
      - type: bind
        source: .
        target: /workspace/CMPLX-PartsFactory
      - type: volume
        source: niemeier-backwalk-data
        target: /data
    networks:
      - cmplx-backend

volumes:
  niemeier-backwalk-data:
    external: true
    name: niemeier-backwalk-data

networks:
  cmplx-backend:
    external: true
    name: cmplx-backend
