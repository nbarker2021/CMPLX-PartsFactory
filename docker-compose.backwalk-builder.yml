# Niemeier backward-category builder (batch; exits when phase completes)
#
#   cd D:\PartsFactory\CMPLX-PartsFactory
#   docker compose -f docker-compose.backwalk-builder.yml up --build --abort-on-container-exit
#
# Pilot (default):
#   docker compose -f docker-compose.backwalk-builder.yml run --rm niemeier-backwalk-builder
#
# Full 24 (resume pilot volume, involution cap 50):
#   .\Start-BackwalkFull24.ps1
#   — or —
#   docker compose -f docker-compose.backwalk-builder.yml `
#     -f docker-compose.backwalk-builder.full24.yml up --build --abort-on-container-exit

name: cmplx-backwalk-builder

services:
  niemeier-backwalk-builder:
    image: cmplx-proof-lab:latest
    build:
      context: .
      dockerfile: proof-lab/Dockerfile
    container_name: niemeier-backwalk-builder
    init: true
    restart: "no"
    environment:
      PROOF_LAB_ROOT: /workspace/CMPLX-PartsFactory
      PROOF_LAB_MODE: backwalk-build
      BACKWALK_PHASE: pilot
      BACKWALK_EXCEPTIONALS: g2,f4,e6
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      PYTHONPATH: /workspace/CMPLX-PartsFactory/packages/lattice-forge/src
    volumes:
      - type: bind
        source: .
        target: /workspace/CMPLX-PartsFactory
      - type: volume
        source: niemeier-backwalk-data
        target: /data
    labels:
      cmplx.layer: proof-lab
      cmplx.role: niemeier-backwalk-builder
    networks:
      - cmplx-backend

volumes:
  niemeier-backwalk-data:
    name: niemeier-backwalk-data

networks:
  cmplx-backend:
    external: true
    name: cmplx-backend
