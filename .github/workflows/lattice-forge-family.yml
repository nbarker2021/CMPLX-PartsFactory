name: lattice-forge-family

on:
  push:
    paths:
      - "packages/lattice-forge/**"
      - "scripts/verify_lattice_forge_family.ps1"
      - "scripts/sync_lattice_forge_package.ps1"
      - "scripts/dev_lattice_forge_env.ps1"
      - "tests/worlds/test_forge*.py"
      - ".github/workflows/lattice-forge-family.yml"
  pull_request:
    paths:
      - "packages/lattice-forge/**"
      - "scripts/verify_lattice_forge_family.ps1"
      - "scripts/sync_lattice_forge_package.ps1"
      - "scripts/dev_lattice_forge_env.ps1"
      - "tests/worlds/test_forge*.py"
      - ".github/workflows/lattice-forge-family.yml"

jobs:
  lattice-forge-family:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lattice-forge (all extras)
        run: |
          python -m pip install --upgrade pip "setuptools>=75" wheel
          pip install -e "packages/lattice-forge[all]"

      - name: Install CMPLX root (worlds pytest deps)
        run: pip install -e ".[dev]"

      - name: Pytest (package + worlds forge)
        run: |
          python -m pytest packages/lattice-forge/tests tests/worlds/test_forge_provider.py -q --tb=short

      - name: run_all_proofs --quick
        working-directory: packages/lattice-forge
        run: |
          python scripts/run_all_proofs.py --quick --output proofs_report.json

      - name: Regression vs expected_outputs.json
        working-directory: packages/lattice-forge
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          report = json.loads(Path("proofs_report.json").read_text(encoding="utf-8"))
          expected = json.loads(Path("expected_outputs.json").read_text(encoding="utf-8"))
          mismatches = []
          for key, exp in expected["expected_proofs"].items():
              act = report["proofs"].get(key)
              if not act:
                  mismatches.append(f"{key} missing")
                  continue
              if exp.get("status") and act.get("status") != exp["status"]:
                  mismatches.append(f"{key} status {act.get('status')} != {exp['status']}")
          if report.get("overall_status") != "pass":
              mismatches.append("overall_status not pass")
          if mismatches:
              print("\n".join(mismatches))
              sys.exit(1)
          print("expected_outputs regression OK")
          PY

      - name: Regimes proofs --quick
        working-directory: packages/lattice-forge
        run: |
          python scripts/run_regimes_proofs.py --quick --output proofs_report_regimes.json

      - name: Regression vs expected_outputs_regimes.json
        working-directory: packages/lattice-forge
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          report = json.loads(Path("proofs_report_regimes.json").read_text(encoding="utf-8"))
          expected = json.loads(Path("expected_outputs_regimes.json").read_text(encoding="utf-8"))
          mismatches = []
          for key, exp in expected["expected_proofs"].items():
              act = report["proofs"].get(key)
              if not act:
                  mismatches.append(f"{key} missing")
                  continue
              for field, ev in exp.items():
                  if act.get(field) != ev:
                      mismatches.append(f"{key}.{field} {act.get(field)} != {ev}")
          if report.get("overall_status") != expected.get("expected_overall_status"):
              mismatches.append("regimes overall_status mismatch")
          if mismatches:
              print("\n".join(mismatches))
              sys.exit(1)
          print("expected_outputs_regimes regression OK")
          PY

      - name: Umbrella regression vs expected_outputs_umbrella.json
        working-directory: packages/lattice-forge
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          report = json.loads(Path("proofs_report.json").read_text(encoding="utf-8"))
          expected = json.loads(Path("expected_outputs_umbrella.json").read_text(encoding="utf-8"))
          mismatches = []
          for key, exp in expected["expected_proofs"].items():
              act = report["proofs"].get(key)
              if not act:
                  mismatches.append(f"{key} missing")
                  continue
              if exp.get("status") and act.get("status") != exp["status"]:
                  mismatches.append(f"{key} status mismatch")
          if mismatches:
              print("\n".join(mismatches))
              sys.exit(1)
          print("expected_outputs_umbrella regression OK")
          PY

      - name: falsify --tier-a --quick
        run: python -m lattice_forge.cli falsify --tier-a --quick
