      }
    },
    "nanoclaw-receipt": {
      "image": "cmplx/morphon:latest",
      "command": [
        "--role",
        "ReceiptClaw"
      ],
      "environment": {
        "NODE_ID": "receipt-manager",
        "ROLE": "ReceiptClaw"
      },
      "volumes": [
        "receipt-chain:/data/receipts"
      ],
      "networks": [
        "morphon-net"
      ]
    },
    "nanoclaw-swarm": {
      "image": "cmplx/morphon:latest",
      "command": [
        "--role",
        "SwarmClaw"
      ],
      "environment": {
        "NODE_ID": "swarm-manager",
        "ROLE": "SwarmClaw",
        "HEAL_RATE": "0.03007",
        "CAPSULE_TTL": "300"
      },
      "networks": [
        "morphon-net"
      ]
    },
    "nanoclaw-route": {
      "image": "cmplx/morphon:latest",
      "command": [
        "--role",
        "RouteClaw"
      ],
      "environment": {
        "NODE_ID": "route-manager",
        "ROLE": "RouteClaw"
      },
      "networks": [
        "morphon-net"
      ]
    }
  },
  "volumes": {
    "mmdb-data": {
      "driver": "local"
    },
    "receipt-chain": {
      "driver": "local"
    },
    "speedlight-cache": {
      "driver": "local"
    },
    "mdhg-gateway": {
      "driver": "local"
    },
    "mdhg-compute-protein": {
      "driver": "local"
    },
    "mdhg-compute-turbulence": {
      "driver": "local"
    },
    "mdhg-storage": {
      "driver": "local"
    },
    "mdhg-governance": {
      "driver": "local"
    }
  },
  "networks": {
    "morphon-net": {
      "driver": "bridge"
    }
  }
}