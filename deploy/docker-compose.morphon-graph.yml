      },
      "networks": [
        "morphon-net"
      ],
      "deploy": {
        "replicas": 1,
        "resources": {
          "limits": {
            "cpus": "0.25",
            "memory": "256M"
          }
        }
      }
    },
    "nanoclaw-awb": {
      "image": "cmplx/morphon:latest",
      "command": [
