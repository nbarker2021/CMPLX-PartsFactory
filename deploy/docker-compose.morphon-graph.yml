        "AWBClaw"
      ],
      "environment": {
        "NODE_ID": "brs-awb",
        "ROLE": "AWBClaw"
      },
      "networks": [
        "morphon-net"
      ],
      "deploy": {
        "replicas": 1,
        "resources": {
          "limits": {
            "cpus": "0.25",
            "memory": "256M"
          }
        }
      }
    },
    "nanoclaw-hodge": {
      "image": "cmplx/morphon:latest",
      "command": [
        "--role",
        "HodgeClaw"
      ],
      "environment": {
        "NODE_ID": "brs-hodge",
        "ROLE": "HodgeClaw"
      },
      "networks": [
        "morphon-net"
      ],
      "deploy": {
        "replicas": 1,
        "resources": {
          "limits": {
            "cpus": "0.25",
            "memory": "256M"
          }
        }
      }
    },
    "nanoclaw-escrow": {
      "image": "cmplx/morphon:latest",
      "command": [
        "--role",
        "EscrowClaw"
      ],
      "environment": {
        "NODE_ID": "brs-escrow",
        "ROLE": "EscrowClaw"
      },
      "networks": [
        "morphon-net"
      ],
      "deploy": {
        "replicas": 1,
        "resources": {
          "limits": {
            "cpus": "0.25",
            "memory": "256M"
          }
        }
      }
    },
    "nanoclaw-crt": {
      "image": "cmplx/morphon:latest",
      "command": [
        "--role",
        "CRTClaw"
      ],
      "environment": {
        "NODE_ID": "brs-crt",
        "ROLE": "CRTClaw"
      },
      "networks": [
        "morphon-net"
      ],
      "deploy": {
        "replicas": 1,
        "resources": {
          "limits": {
            "cpus": "0.25",
            "memory": "256M"
          }
        }
      }
    },
    "nanoclaw-syndrome": {
      "image": "cmplx/morphon:latest",
      "command": [
        "--role",
        "SyndromeClaw"
      ],
      "environment": {
        "NODE_ID": "brs-syndrome",
        "ROLE": "SyndromeClaw"
      },
      "networks": [
        "morphon-net"
      ],
      "deploy": {
        "replicas": 1,
        "resources": {
          "limits": {
            "cpus": "0.25",
            "memory": "256M"
          }
        }
      }
    },
    "nanoclaw-eversionclaw": {
      "image": "cmplx/morphon:latest",
      "command": [
        "--role",
        "EversionClaw"
      ],
      "environment": {
        "NODE_ID": "nanoclaw-eversionclaw",
        "ROLE": "EversionClaw"
      },
      "networks": [
        "morphon-net"
      ],
      "deploy": {
        "replicas": 2
      }
    },
    "nanoclaw-inflationclaw": {
      "image": "cmplx/morphon:latest",
      "command": [
        "--role",
        "InflationClaw"
      ],
      "environment": {
