[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lattice-forge"
version = "0.3.0"
description = "Installable morphism-saturated lattice admissibility engine with bundled seed state and Niemeier backwalk jobs."
readme = "README.md"
requires-python = ">=3.10"
authors = [{name = "Lattice Forge"}]
license = {text = "MIT"}
keywords = [
    "lattice",
    "morphism",
    "admissibility",
    "root-systems",
    "niemeier",
    "weyl-group",
    "backwalk",
    "receipts",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Mathematics",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/nbarker2021/CMPLX-PartsFactory"
Documentation = "https://github.com/nbarker2021/CMPLX-PartsFactory/tree/main/packages/lattice-forge"
Repository = "https://github.com/nbarker2021/CMPLX-PartsFactory"

[project.optional-dependencies]
algebra = []
solver = []
theory = ["sympy>=1.12"]
proofs = ["pytest>=8"]
server = ["fastapi>=0.110", "uvicorn>=0.27", "httpx>=0.27"]
witness = ["pydantic>=2"]
decomposition = []
prize-core = []
regimes = []
umbrella = []
transport-tower = []
all = [
    "lattice-forge[algebra,solver,theory,proofs,server,witness,decomposition,prize-core,regimes,umbrella,transport-tower]",
]
test = ["pytest>=8", "httpx>=0.27"]

[project.scripts]
lattice-forge = "lattice_forge.cli:main"
lattice-forge-backwalk = "lattice_forge.backwalk.runner:main_backwalk"
lattice-forge-weyl-bond = "lattice_forge.backwalk.runner:main_weyl_orchestrate"
lattice-forge-lattice-space = "lattice_forge.backwalk.runner:main_lattice_space"
lattice-forge-verify-algebra = "lattice_forge.algebra.verify_o1:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"lattice_forge" = ["py.typed", "data/*.json"]
"lattice_forge.ledger" = ["data/*.db"]
"lattice_forge.falsify" = ["py.typed"]

[tool.pytest.ini_options]
pythonpath = ["src"]
